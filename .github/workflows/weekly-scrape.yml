name: Weekly LinkedIn Scrape

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout linkedin-mcp-custom
        uses: actions/checkout@v4

      - name: Checkout B2B-Knowledge-Base
        uses: actions/checkout@v4
        with:
          repository: outpost2026/B2B-Knowledge-Base
          token: ${{ secrets.KB_PAT }}
          path: _github/B2B-Knowledge-Base

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync

      - name: Inject LinkedIn cookies
        env:
          COOKIE_JSON: ${{ secrets.LINKEDIN_COOKIES }}
        run: |
          mkdir -p ~/.linkedin-mcp-custom/profile
          printf '%s' "$COOKIE_JSON" > ~/.linkedin-mcp-custom/cookies_export.json

      - name: Run pipeline
        run: |
          uv run python -c "
          import asyncio, json, logging
          from pathlib import Path
          from linkedin_mcp_custom.core import get_or_create_browser, ensure_authenticated, close_browser
          from linkedin_mcp_custom.scraping import LinkedInExtractor
          from linkedin_mcp_custom.analysis.scorer import score_job
          from linkedin_mcp_custom.analysis.schemas import JobFeatures
          from linkedin_mcp_custom.analysis.kb_writer import KBWriter
          logging.basicConfig(level=logging.INFO)

          async def run():
              cookies_path = Path.home() / '.linkedin-mcp-custom' / 'cookies_export.json'
              context = await get_or_create_browser()

              # Inject cookies before navigating
              if cookies_path.exists():
                  with open(cookies_path) as f:
                      cookies = json.load(f)
                  await context.add_cookies(cookies)
                  print(f'Injected {len(cookies)} LinkedIn cookies')

              page = context.pages[0]
              await page.goto('https://www.linkedin.com/feed/', wait_until='domcontentloaded')
              print(f'Current URL: {page.url}')

              await ensure_authenticated(page)
              extractor = LinkedInExtractor(page)
              saved = await extractor.scrape_saved_jobs()
              job_ids = saved.get('job_ids', [])
              print(f'Found {len(job_ids)} jobs')

              kb_writer = KBWriter(str(Path('_github/B2B-Knowledge-Base/02_ANALÝZY/00_linkedin')))

              for jid in job_ids:
                  try:
                      details = await extractor.scrape_job(jid)
                      sections = details.get('sections', {})
                      raw_text = sections.get('job_posting', '')
                      if not raw_text:
                          continue
                      features = JobFeatures(
                          raw_text=raw_text,
                          job_title=details.get('job_title', ''),
                          company=details.get('company', ''),
                          location=details.get('location', ''),
                          job_id=jid,
                      )
                      eroi = score_job(features)
                      result = kb_writer.write_all(eroi, raw_text, linkedin_job_id=jid)
                      print(f'  {result.get(\"id\", \"?\")} {eroi.total_score}% ({eroi.verdict})')
                  except Exception as e:
                      print(f'  ERROR {jid}: {e}')

              kb_writer.commit_changes()
              print('Pipeline complete')

          asyncio.run(run())
          "

      - name: Commit and push KB changes
        working-directory: _github/B2B-Knowledge-Base
        run: |
          git config user.name "linkedin-mcp-bot"
          git config user.email "bot@linkedin-mcp-custom"
          git add -A
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "[scrape] weekly job analysis $(date +%Y-%m-%d)"
            git push
          fi
